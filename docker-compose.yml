services:
  postgres:
    image: postgres:16-alpine
    container_name: wb_postgres
    restart: unless-stopped
    ports:
      - "6363:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wb_scanner}
      POSTGRES_USER: ${POSTGRES_USER:-wb_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wb_user} -d ${POSTGRES_DB:-wb_scanner}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wb_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-wb_user}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-wb_scanner}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: wb_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
